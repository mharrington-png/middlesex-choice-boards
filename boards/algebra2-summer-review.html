<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MX² Algebra 2 — Summer Review | Middlesex School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     TOKENS & RESET
  ============================================================ */
  :root {
    --crimson:     #cf003d;
    --crimson-dim: #8a0028;
    --crimson-glow:#ff1a55;
    --black:       #0d0d0d;
    --surface:     #151515;
    --surface2:    #1e1e1e;
    --surface3:    #252525;
    --border:      #2e2e2e;
    --border-light:#3a3a3a;
    --text:        #f0ece6;
    --text-muted:  #9e9e9e;
    --text-dim:    #666666;

    --col1: #cf003d;
    --col2: #1a6b5a;
    --col3: #4a5568;
    --col4: #7c4a1e;

    --col1-light: #ff4d75;
    --col2-light: #2dd4bf;
    --col3-light: #94a3b8;
    --col4-light: #f59e0b;

    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.7);
  }

  /* ============================================================
     LIGHT THEME OVERRIDES — activated via [data-theme="light"]
     on <html>. Crimson stays constant; surfaces, text, and the
     lighter column accents swap to values with enough contrast
     on a white background.
  ============================================================ */
  [data-theme="light"] {
    --crimson-glow:#cf003d;
    --black:       #f5f4f1;
    --surface:     #ffffff;
    --surface2:    #f7f6f3;
    --surface3:    #eeece7;
    --border:      #ddd9d1;
    --border-light:#c9c3b8;
    --text:        #1a1917;
    --text-muted:  #55534c;
    --text-dim:    #857f74;

    --col1-light: #cf003d;
    --col2-light: #0f766e;
    --col3-light: #475569;
    --col4-light: #b45309;

    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.65;
    min-height: 100vh;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  /* ============================================================
     HEADER — centered layout
  ============================================================ */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 28px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--crimson), var(--crimson-glow), var(--crimson));
  }

  header::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(207,0,61,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 12px;
  }

  .school-tag {
    font-family: 'Source Serif 4', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--crimson-glow);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .school-tag::before,
  .school-tag::after {
    content: '';
    display: inline-block;
    width: 28px;
    height: 1px;
    background: var(--crimson-glow);
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-top: 4px;
  }

  h1 em {
    font-style: italic;
    color: var(--crimson-glow);
  }

  .header-meta {
    margin-top: 4px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .meta-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ============================================================
     INSTRUCTIONS BAR
  ============================================================ */
  .instructions {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.03em;
  }

  .instructions strong { color: var(--crimson-glow); font-weight: 600; }

  /* ============================================================
     BOARD GRID — equal-height tiles across columns
  ============================================================ */
  .board-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: auto repeat(4, 1fr);
    gap: 20px;
  }

  .col-group {
    display: contents;
  }

  /* Column headers */
  .col-header {
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 16px 18px 14px;
    position: relative;
    overflow: hidden;
    align-self: start;
  }

  .col-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .col-1-header { background: color-mix(in srgb, var(--col1) 30%, var(--surface2)); border: 1px solid color-mix(in srgb, var(--col1) 40%, transparent); }
  .col-2-header { background: color-mix(in srgb, var(--col2) 30%, var(--surface2)); border: 1px solid color-mix(in srgb, var(--col2) 40%, transparent); }
  .col-3-header { background: color-mix(in srgb, var(--col3) 30%, var(--surface2)); border: 1px solid color-mix(in srgb, var(--col3) 40%, transparent); }
  .col-4-header { background: color-mix(in srgb, var(--col4) 30%, var(--surface2)); border: 1px solid color-mix(in srgb, var(--col4) 40%, transparent); }

  .col-header-num {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.7;
  }

  .col-1-header .col-header-num { color: var(--col1-light); }
  .col-2-header .col-header-num { color: var(--col2-light); }
  .col-3-header .col-header-num { color: var(--col3-light); }
  .col-4-header .col-header-num { color: var(--col4-light); }

  .col-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
  }

  .col-header .col-topics {
    margin-top: 6px;
    font-size: 10.5px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* ============================================================
     TILES
  ============================================================ */
  .tile {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 28px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .tile::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: var(--radius) 0 0 var(--radius);
    transition: opacity 0.2s;
  }

  .col-1 .tile::before { background: var(--col1-light); }
  .col-2 .tile::before { background: var(--col2-light); }
  .col-3 .tile::before { background: var(--col3-light); }
  .col-4 .tile::before { background: var(--col4-light); }

  .tile:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    background: var(--surface3);
  }

  .col-1 .tile:hover { border-color: color-mix(in srgb, var(--col1) 60%, transparent); }
  .col-2 .tile:hover { border-color: color-mix(in srgb, var(--col2) 60%, transparent); }
  .col-3 .tile:hover { border-color: color-mix(in srgb, var(--col3) 60%, transparent); }
  .col-4 .tile:hover { border-color: color-mix(in srgb, var(--col4) 60%, transparent); }

  .tile-icon {
    font-size: 18px;
    margin-bottom: 8px;
    display: block;
  }

  .tile-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 5px;
  }

  .tile-sub {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .tile-topics {
    position: absolute;
    bottom: 10px;
    left: 18px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .tile-arrow {
    position: absolute;
    bottom: 12px; right: 14px;
    font-size: 14px;
    opacity: 0.3;
    transition: opacity 0.2s, transform 0.2s;
  }

  .tile:hover .tile-arrow { opacity: 0.8; transform: translate(2px, -2px); }
  .col-1 .tile:hover .tile-arrow { color: var(--col1-light); }
  .col-2 .tile:hover .tile-arrow { color: var(--col2-light); }
  .col-3 .tile:hover .tile-arrow { color: var(--col3-light); }
  .col-4 .tile:hover .tile-arrow { color: var(--col4-light); }

  /* ============================================================
     MODAL
  ============================================================ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 760px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    animation: slideUp 0.22s ease;
    position: relative;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .modal-header-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .modal-col-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .modal-close:hover { background: var(--crimson); color: white; border-color: var(--crimson); }

  .modal-body { padding: 24px 28px 32px; }

  /* Video section (optional) */
  .video-section {
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 24px;
  }

  .video-label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .video-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: var(--crimson-glow);
    text-decoration: none;
    font-size: 13.5px;
    font-family: 'Source Serif 4', serif;
    transition: color 0.15s;
  }

  .video-link:hover { color: #fff; }

  .video-icon {
    font-size: 12px;
    opacity: 0.7;
  }

  /* Problems */
  .problem-block {
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .problem-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .problem-num {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .problem-context {
    font-size: 14px;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-left: 12px;
    border-left: 2px solid var(--border-light);
  }

  .problem-text {
    font-size: 14.5px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  .problem-parts { margin-left: 0; list-style: none; }

  .problem-parts li {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 8px;
    padding-left: 24px;
    position: relative;
    line-height: 1.6;
  }

  .problem-parts li::before {
    content: attr(data-part);
    position: absolute;
    left: 0;
    font-weight: 700;
    color: var(--text-muted);
  }

  .problem-img {
    display: block;
    width: 360px;
    max-width: 100%;
    border-radius: 6px;
    margin: 10px 0 6px;
  }

  /* Inline data tables used in table-based problems */
  .data-table {
    border-collapse: collapse;
    margin: 10px 0 16px;
    font-size: 13.5px;
    width: auto;
  }

  .data-table th, .data-table td {
    border: 1px solid var(--border-light);
    padding: 6px 14px;
    text-align: center;
    color: var(--text);
  }

  .data-table th {
    background: var(--surface3);
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .answer-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 16px;
    color: var(--text-muted);
    font-family: 'Source Serif 4', serif;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    margin-top: 4px;
  }

  .answer-toggle:hover { background: var(--surface3); border-color: var(--border-light); color: var(--text); }
  .answer-toggle .toggle-icon { font-size: 10px; transition: transform 0.2s; }
  .answer-toggle.open .toggle-icon { transform: rotate(180deg); }

  .answer-panel {
    display: none;
    margin-top: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
    animation: expandIn 0.18s ease;
  }

  @keyframes expandIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .answer-panel.open { display: block; }

  .answer-part { margin-bottom: 10px; padding-left: 20px; position: relative; }
  .answer-part:last-child { margin-bottom: 0; }
  .answer-part-label { position: absolute; left: 0; font-weight: 700; color: var(--text-muted); }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width: 1000px) {
    .board-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .col-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: calc(50% - 10px);
    }
    .col-header {
      border-radius: var(--radius);
    }
    .tile {
      grid-column: unset !important;
      grid-row: unset !important;
    }
  }

  @media (max-width: 600px) {
    .board-grid { flex-direction: column; }
    .col-group { width: 100%; }
    header { padding: 20px; }
    .board-wrap { padding: 20px 12px 40px; }
    .modal { border-radius: var(--radius); }
    .modal-header, .modal-body { padding: 18px; }
  }

  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: var(--surface); }
  .modal::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  /* ============================================================
     RANDOM PRACTICE BAR
  ============================================================ */
  .random-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }

  .random-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 0 36px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    font-family: 'Source Serif 4', serif;
  }

  .random-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(207,0,61,0.06) 30%, rgba(207,0,61,0.10) 50%, rgba(207,0,61,0.06) 70%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .random-btn:hover::before { opacity: 1; }

  .random-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(207,0,61,0.18), 0 2px 8px rgba(0,0,0,0.4);
    border-color: color-mix(in srgb, var(--crimson) 55%, transparent);
    background: var(--surface3);
  }

  .random-btn:active { transform: translateY(0) scale(0.995); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

  .random-btn-left-notch, .random-btn-right-notch {
    position: absolute;
    bottom: 0;
    width: 28px; height: 5px;
    background: var(--border);
    border-radius: 3px 3px 0 0;
    transition: background 0.2s;
  }
  .random-btn-left-notch  { left: 60px; }
  .random-btn-right-notch { right: 60px; }
  .random-btn:hover .random-btn-left-notch,
  .random-btn:hover .random-btn-right-notch { background: color-mix(in srgb, var(--crimson) 40%, var(--border)); }

  .random-btn-icon { font-size: 22px; flex-shrink: 0; transition: transform 0.3s ease; }
  .random-btn:hover .random-btn-icon { transform: rotate(20deg) scale(1.15); }

  .random-btn-label { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .random-btn-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--text); letter-spacing: 0.01em; line-height: 1.2; }
  .random-btn-sub { font-size: 11.5px; color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; }

  .random-btn-badge {
    position: absolute;
    right: 28px;
    background: var(--surface3);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Source Serif 4', serif;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }

  .random-btn:hover .random-btn-badge {
    background: color-mix(in srgb, var(--crimson) 15%, var(--surface3));
    color: var(--crimson-glow);
    border-color: color-mix(in srgb, var(--crimson) 40%, transparent);
  }

  .random-accent {
    background: linear-gradient(90deg, var(--col1-light), var(--col2-light), var(--col3-light), var(--col4-light));
    background-size: 300% 100%;
    animation: accentShift 4s ease infinite;
  }

  @keyframes accentShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @media (max-width: 600px) {
    .random-wrap { padding: 0 12px 36px; }
    .random-btn { height: 64px; border-radius: 10px; }
    .random-btn-badge, .random-btn-left-notch, .random-btn-right-notch { display: none; }
  }

  /* ============================================================
     DESMOS FLOATING BUTTON
  ============================================================ */
  .desmos-fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 1050;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 50px;
    padding: 0 20px 0 14px;
    height: 52px;
    display: none;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    font-family: 'Source Serif 4', serif;
  }

  .desmos-fab.visible {
    display: flex;
    animation: fadeIn 0.18s ease;
  }

  .desmos-fab:hover {
    transform: translateY(-2px);

  columns.forEach((col, ci) => {
    const colGroup = document.createElement('div');
    colGroup.className = 'col-group';

    // Header
    const header = document.createElement('div');
    header.className = `col-header ${col.headerClass}`;
    header.style.gridColumn = ci + 1;
    header.style.gridRow = 1;
    header.innerHTML = `
      <div class="col-header-num">${col.label}</div>
      <h2>${col.title}</h2>
      <div class="col-topics">${col.topics}</div>
    `;
    colGroup.appendChild(header);

    // Tiles
    col.tiles.forEach((tile, ti) => {
      const tileEl = document.createElement('div');
      tileEl.className = `tile ${col.tileClass}`;
      tileEl.style.gridColumn = ci + 1;
      tileEl.style.gridRow = ti + 2;
      tileEl.setAttribute('role', 'button');
      tileEl.setAttribute('tabindex', '0');
      tileEl.setAttribute('aria-label', tile.title);
      tileEl.innerHTML = `
        <span class="tile-icon">${tile.icon}</span>
        <div class="tile-title">${tile.title}</div>
        <div class="tile-sub">${tile.sub}</div>
        <span class="tile-arrow">↗</span>
      `;
      tileEl.addEventListener('click', () => openModal(ci, ti));
      tileEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(ci, ti); });
      colGroup.appendChild(tileEl);
    });

    grid.appendChild(colGroup);
  });
}

/* ============================================================
   MODAL
============================================================ */
function openModal(colIdx, tileIdx) {
  const col  = columns[colIdx];
  const tile = col.tiles[tileIdx];

  const accentEl = document.getElementById('modal-accent');
  accentEl.className = 'modal-header-accent';
  accentEl.style.background = col.accentVar;

  const labelEl = document.getElementById('modal-col-label');
  labelEl.style.color = col.accentVar;
  labelEl.textContent = col.label + ' · ' + col.title;

  document.getElementById('modal-title').textContent = tile.title;

  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  // Optional video section
  if (tile.video) {
    const videoSection = document.createElement('div');
    videoSection.className = 'video-section';
    videoSection.innerHTML = `
      <div class="video-label">📹 Watch First</div>
      <a href="${tile.video.url}" target="_blank" rel="noopener" class="video-link">
        ${tile.video.title} — mathispower4u
        <span class="video-icon">▶</span>
      </a>
    `;
    body.appendChild(videoSection);
  }

  tile.problems.forEach((prob, pi) => {
    const block = document.createElement('div');
    block.className = 'problem-block';

    let partsHTML = '';
    if (prob.parts && prob.parts.length) {
      partsHTML = `<ul class="problem-parts">` +
        prob.parts.map(p => `<li data-part="${p.label}">${p.text}</li>`).join('') +
        `</ul>`;
    }

    let answersHTML = '';
    if (prob.answers && prob.answers.length) {
      answersHTML = prob.answers.map(a =>
        `<div class="answer-part">${a.label ? `<span class="answer-part-label">${a.label}</span>` : ''}${a.text}</div>`
      ).join('');
    }

    const answerId = `ans-${colIdx}-${tileIdx}-${pi}`;
    const toggleId = `tog-${colIdx}-${tileIdx}-${pi}`;

    block.innerHTML = `
      <div class="problem-num">Problem ${pi + 1} of ${tile.problems.length}</div>
      ${prob.context ? `<div class="problem-context">${prob.context}</div>` : ''}
      ${prob.stem ? `<div class="problem-text">${prob.stem}</div>` : ''}
      ${partsHTML}
      <button class="answer-toggle" id="${toggleId}" onclick="toggleAnswer('${answerId}','${toggleId}')">
        <span class="toggle-icon">▼</span> Show Answer
      </button>
      <div class="answer-panel" id="${answerId}">
        ${answersHTML}
      </div>
    `;
    body.appendChild(block);
  });

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('desmos-fab').classList.add('visible');

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([body]).catch(err => console.log(err));
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('desmos-fab').classList.remove('visible');
}

function toggleAnswer(panelId, toggleId) {
  const panel  = document.getElementById(panelId);
  const toggle = document.getElementById(toggleId);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  toggle.classList.toggle('open');
  toggle.innerHTML = isOpen
    ? '<span class="toggle-icon">▼</span> Show Answer'
    : '<span class="toggle-icon">▼</span> Hide Answer';
}

/* ============================================================
   RANDOM PRACTICE
============================================================ */
function openRandomProblem() {
  const colIdx  = Math.floor(Math.random() * columns.length);
  const col     = columns[colIdx];
  const tileIdx = Math.floor(Math.random() * col.tiles.length);
  const tile    = col.tiles[tileIdx];
  const probIdx = Math.floor(Math.random() * tile.problems.length);
  const prob    = tile.problems[probIdx];

  const accentEl = document.getElementById('modal-accent');
  accentEl.className = 'modal-header-accent random-accent';
  accentEl.style.background = '';

  const labelEl = document.getElementById('modal-col-label');
  labelEl.style.color = 'var(--text-muted)';
  labelEl.innerHTML = 'MX² Algebra 2 · Summer Review';

  document.getElementById('modal-title').textContent = 'General Practice';

  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  const block = document.createElement('div');
  block.className = 'problem-block';
  block.style.borderBottom = 'none';
  block.style.marginBottom = '0';
  block.style.paddingBottom = '0';

  let partsHTML = '';
  if (prob.parts && prob.parts.length) {
    partsHTML = `<ul class="problem-parts">` +
      prob.parts.map(p => `<li data-part="${p.label}">${p.text}</li>`).join('') +
      `</ul>`;
  }

  let answersHTML = '';
  if (prob.answers && prob.answers.length) {
    answersHTML = prob.answers.map(a =>
      `<div class="answer-part">${a.label ? `<span class="answer-part-label">${a.label}</span>` : ''}${a.text}</div>`
    ).join('');
  }

  block.innerHTML = `
    <div class="problem-num">🎲 General Practice</div>
    ${prob.context ? `<div class="problem-context">${prob.context}</div>` : ''}
    ${prob.stem ? `<div class="problem-text">${prob.stem}</div>` : ''}
    ${partsHTML}
    <button class="answer-toggle" id="rand-tog" onclick="toggleAnswer('rand-ans','rand-tog')">
      <span class="toggle-icon">▼</span> Show Answer
    </button>
    <div class="answer-panel" id="rand-ans">
      ${answersHTML}
    </div>
  `;

  body.appendChild(block);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('desmos-fab').classList.add('visible');

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([body]).catch(err => console.log(err));
  }
}

document.getElementById('random-btn').addEventListener('click', openRandomProblem);

/* ============================================================
   DESMOS BUTTON
============================================================ */
document.getElementById('desmos-fab').addEventListener('click', () => {
  window.open('https://www.desmos.com/calculator', '_blank', 'width=650,height=350,noopener,noreferrer');
});

/* ============================================================
   THEME TOGGLE
============================================================ */
const themeToggleBtn  = document.getElementById('theme-toggle');
const themeIconEl     = document.getElementById('theme-icon');

// Sync icon with whatever theme was applied by the early flash-prevention script
themeIconEl.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☀️' : '🌙';

themeToggleBtn.addEventListener('click', () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('mx2-theme', 'dark');
    themeIconEl.textContent = '🌙';
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('mx2-theme', 'light');
    themeIconEl.textContent = '☀️';
  }
});

/* ============================================================
   EVENT LISTENERS
============================================================ */
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

</script>
