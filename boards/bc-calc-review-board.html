<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BC Calculus Choice Board | Middlesex School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    startup: {
      typeset: false,
      ready() {
        MathJax.startup.defaultReady();
        // Typeset the full page (board tiles, headers, etc.) once MathJax is loaded
        MathJax.typesetPromise([document.body]);
      }
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
  /* ============================================================
     TOKENS & RESET
  ============================================================ */
  :root {
    --crimson:      #cf003d;
    --crimson-dim:  #8a0028;
    --crimson-glow: #ff1a55;
    --black:        #0d0d0d;
    --surface:      #151515;
    --surface2:     #1e1e1e;
    --surface3:     #252525;
    --border:       #2e2e2e;
    --border-light: #3a3a3a;
    --text:         #f0ece6;
    --text-muted:   #9e9e9e;
    --text-dim:     #666666;

    /* 5 column accents */
    --col1-light: #ff4d75;   /* crimson/red     — Limits */
    --col2-light: #60a5fa;   /* cool blue       — Derivatives */
    --col3-light: #34d399;   /* emerald         — Integrals */
    --col4-light: #f59e0b;   /* amber           — Series */
    --col5-light: #c084fc;   /* purple          — Parametric & Polar */

    --radius:    10px;
    --radius-lg: 16px;
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.7);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ============================================================
     HEADER
  ============================================================ */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--crimson), var(--crimson-glow), var(--crimson));
  }
  header::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(207,0,61,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-inner {
    max-width: 1500px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
  }

  .school-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--crimson-glow);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .school-tag::before, .school-tag::after {
    content: '';
    display: inline-block;
    width: 24px; height: 1px;
    background: var(--crimson-glow);
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  h1 em { font-style: italic; color: var(--crimson-glow); }

  .header-meta {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .meta-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ============================================================
     INSTRUCTIONS BAR
  ============================================================ */
  .instructions {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 12px 40px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.03em;
  }
  .instructions strong { color: var(--crimson-glow); font-weight: 600; }

  /* ============================================================
     BOARD GRID
  ============================================================ */
  .board-wrap {
    max-width: 1500px;
    margin: 0 auto;
    padding: 32px 20px 48px;
  }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
  }

  .col-header {
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 14px 14px 12px;
    margin-bottom: -4px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .col-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .col-1-header { background: color-mix(in srgb, #cf003d 25%, var(--surface2)); border: 1px solid color-mix(in srgb, #cf003d 35%, transparent); }
  .col-2-header { background: color-mix(in srgb, #2563eb 25%, var(--surface2)); border: 1px solid color-mix(in srgb, #2563eb 35%, transparent); }
  .col-3-header { background: color-mix(in srgb, #059669 25%, var(--surface2)); border: 1px solid color-mix(in srgb, #059669 35%, transparent); }
  .col-4-header { background: color-mix(in srgb, #d97706 25%, var(--surface2)); border: 1px solid color-mix(in srgb, #d97706 35%, transparent); }
  .col-5-header { background: color-mix(in srgb, #7c3aed 25%, var(--surface2)); border: 1px solid color-mix(in srgb, #7c3aed 35%, transparent); }

  .col-header-num {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.7;
  }
  .col-1-header .col-header-num { color: var(--col1-light); }
  .col-2-header .col-header-num { color: var(--col2-light); }
  .col-3-header .col-header-num { color: var(--col3-light); }
  .col-4-header .col-header-num { color: var(--col4-light); }
  .col-5-header .col-header-num { color: var(--col5-light); }

  .col-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
  }

  .col-group { display: flex; flex-direction: column; gap: 10px; }

  /* ============================================================
     TILES
  ============================================================ */
  .tile {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px 22px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .tile::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .col-1 .tile::before { background: var(--col1-light); }
  .col-2 .tile::before { background: var(--col2-light); }
  .col-3 .tile::before { background: var(--col3-light); }
  .col-4 .tile::before { background: var(--col4-light); }
  .col-5 .tile::before { background: var(--col5-light); }

  .tile:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); background: var(--surface3); }
  .col-1 .tile:hover { border-color: color-mix(in srgb, #cf003d 55%, transparent); }
  .col-2 .tile:hover { border-color: color-mix(in srgb, #2563eb 55%, transparent); }
  .col-3 .tile:hover { border-color: color-mix(in srgb, #059669 55%, transparent); }
  .col-4 .tile:hover { border-color: color-mix(in srgb, #d97706 55%, transparent); }
  .col-5 .tile:hover { border-color: color-mix(in srgb, #7c3aed 55%, transparent); }

  .tile-icon { font-size: 18px; margin-bottom: 7px; display: block; }
  .tile-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 5px;
  }
  .tile-sub { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

  .tile-arrow {
    position: absolute;
    bottom: 10px; right: 12px;
    font-size: 13px;
    opacity: 0.3;
    transition: opacity 0.2s, transform 0.2s;
  }
  .tile:hover .tile-arrow { opacity: 0.8; transform: translate(2px,-2px); }
  .col-1 .tile:hover .tile-arrow { color: var(--col1-light); }
  .col-2 .tile:hover .tile-arrow { color: var(--col2-light); }
  .col-3 .tile:hover .tile-arrow { color: var(--col3-light); }
  .col-4 .tile:hover .tile-arrow { color: var(--col4-light); }
  .col-5 .tile:hover .tile-arrow { color: var(--col5-light); }

  /* ============================================================
     MODAL
  ============================================================ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 720px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    animation: slideUp 0.22s ease;
    position: relative;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .modal-header {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    z-index: 1;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .modal-header-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .modal-col-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .modal-close:hover { background: var(--crimson); color: white; border-color: var(--crimson); }

  .modal-body { padding: 22px 26px 30px; }

  .problem-block {
    margin-bottom: 26px;
    padding-bottom: 26px;
    border-bottom: 1px solid var(--border);
  }
  .problem-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .problem-num {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 9px;
  }
  .problem-text {
    font-size: 14.5px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 14px;
  }

  .answer-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text-muted);
    font-family: 'Source Serif 4', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .answer-toggle:hover { background: var(--surface3); border-color: var(--border-light); color: var(--text); }
  .toggle-icon { font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .answer-toggle.open .toggle-icon { transform: rotate(180deg); }

  .answer-panel {
    display: none;
    margin-top: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
    animation: expandIn 0.18s ease;
  }
  @keyframes expandIn {
    from { opacity:0; transform:translateY(-6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .answer-panel.open { display: block; }

  /* ============================================================
     RANDOM PRACTICE BAR
  ============================================================ */
  .random-wrap {
    max-width: 1500px;
    margin: 0 auto;
    padding: 0 20px 52px;
  }

  .random-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 0 36px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    font-family: 'Source Serif 4', serif;
  }
  .random-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg,
      transparent 0%, rgba(207,0,61,0.06) 30%,
      rgba(207,0,61,0.10) 50%, rgba(207,0,61,0.06) 70%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .random-btn:hover::before { opacity: 1; }
  .random-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(207,0,61,0.18), 0 2px 8px rgba(0,0,0,0.4);
    border-color: color-mix(in srgb, var(--crimson) 55%, transparent);
    background: var(--surface3);
  }
  .random-btn:active { transform: translateY(0) scale(0.995); }

  .random-btn-left-notch, .random-btn-right-notch {
    position: absolute;
    bottom: 0;
    width: 28px; height: 5px;
    background: var(--border);
    border-radius: 3px 3px 0 0;
    transition: background 0.2s;
  }
  .random-btn-left-notch  { left: 60px; }
  .random-btn-right-notch { right: 60px; }
  .random-btn:hover .random-btn-left-notch,
  .random-btn:hover .random-btn-right-notch {
    background: color-mix(in srgb, var(--crimson) 40%, var(--border));
  }

  .random-btn-icon { font-size: 22px; flex-shrink: 0; transition: transform 0.3s ease; }
  .random-btn:hover .random-btn-icon { transform: rotate(20deg) scale(1.15); }

  .random-btn-label { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .random-btn-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .random-btn-sub {
    font-size: 11.5px;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .random-btn-badge {
    position: absolute;
    right: 28px;
    background: var(--surface3);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Source Serif 4', serif;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .random-btn:hover .random-btn-badge {
    background: color-mix(in srgb, var(--crimson) 15%, var(--surface3));
    color: var(--crimson-glow);
    border-color: color-mix(in srgb, var(--crimson) 40%, transparent);
  }

  /* Cycling gradient for random modal */
  .random-accent {
    background: linear-gradient(90deg, var(--col1-light), var(--col2-light), var(--col3-light), var(--col4-light), var(--col5-light));
    background-size: 400% 100%;
    animation: accentShift 5s ease infinite;
  }
  @keyframes accentShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: var(--surface); }
  .modal::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  @media (max-width: 1100px) { .board-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 700px) {
    .board-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 20px; }
    .board-wrap, .random-wrap { padding-left: 12px; padding-right: 12px; }
    .random-btn { height: 64px; border-radius: 10px; }
    .random-btn-badge, .random-btn-left-notch, .random-btn-right-notch { display: none; }
  }
  @media (max-width: 440px) { .board-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<header>
  <div class="header-inner">
    <div class="school-tag">Middlesex School · mxschool.edu</div>
    <h1>BC Calculus — <em>Practice</em> Choice Board</h1>
    <div class="header-meta">
      <span class="meta-pill">📐 Limits &amp; Continuity</span>
      <span class="meta-pill">∂ Derivatives</span>
      <span class="meta-pill">∫ Integrals</span>
      <span class="meta-pill">∑ Series &amp; Sequences</span>
      <span class="meta-pill">🌀 Parametric &amp; Polar</span>
    </div>
  </div>
</header>

<div class="instructions">
  Click any tile to open practice problems. Use <strong>Show Answer</strong> to check your work after attempting each problem.
</div>

<!-- ============================================================
     BOARD
============================================================ -->
<div class="board-wrap">
  <div class="board-grid" id="board-grid"></div>
</div>

<!-- ============================================================
     RANDOM PRACTICE BAR
============================================================ -->
<div class="random-wrap">
  <button class="random-btn" id="random-btn" aria-label="Random Practice">
    <div class="random-btn-left-notch"></div>
    <div class="random-btn-right-notch"></div>
    <span class="random-btn-icon">🎲</span>
    <div class="random-btn-label">
      <span class="random-btn-title">Random Practice</span>
      <span class="random-btn-sub">Any topic · Any tile · Any problem</span>
    </div>
    <span class="random-btn-badge" id="problem-count-badge">— problems</span>
  </button>
</div>

<!-- ============================================================
     MODAL
============================================================ -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-accent" id="modal-accent"></div>
      <div>
        <div class="modal-col-label" id="modal-col-label"></div>
        <div class="modal-title"  id="modal-title"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
/* ============================================================
   DATA — edit problems here without touching layout code.
   Each problem: { q: "question (HTML + $math$)", a: "answer HTML" }
============================================================ */
const columns = [

  // ── COLUMN 1: LIMITS & CONTINUITY ──────────────────────────
  {
    label:'Column I', title:'Limits & Continuity',
    accentVar:'var(--col1-light)',
    headerClass:'col-1-header', tileClass:'col-1',
    tiles:[
      {
        icon:'🔍', title:'Evaluating Limits',
        sub:'Algebraic, trigonometric, and limit laws',
        problems:[
          { q:`Evaluate: $\\displaystyle\\lim_{x \\to 3} \\frac{x^2 - 9}{x - 3}$`,
            a:`Factor: $\\frac{(x-3)(x+3)}{x-3} = x+3$. As $x\\to 3$: $\\boxed{6}$.` },
          { q:`Evaluate: $\\displaystyle\\lim_{x \\to 0} \\frac{\\sin 5x}{x}$`,
            a:`Use $\\lim_{x\\to 0}\\frac{\\sin kx}{x}=k$. Answer: $\\boxed{5}$.` },
          { q:`Evaluate: $\\displaystyle\\lim_{x \\to \\infty} \\frac{3x^2-7}{5x^2+2x}$`,
            a:`Divide by $x^2$: ratio $\\to 3/5$. Answer: $\\boxed{\\tfrac{3}{5}}$.` },
          { q:`Evaluate: $\\displaystyle\\lim_{x \\to 0} \\frac{1-\\cos x}{x^2}$`,
            a:`Standard limit (or L'Hôpital twice): $\\boxed{\\tfrac{1}{2}}$.` },
          { q:`Evaluate: $\\displaystyle\\lim_{x \\to 2^-} \\frac{|x-2|}{x-2}$`,
            a:`As $x\\to 2^-$, $|x-2|=-(x-2)$, so the expression $= -1$. $\\boxed{-1}$.` },
        ]
      },
      {
        icon:'⚖️', title:"L'Hôpital's Rule",
        sub:'Indeterminate forms 0/0 and ∞/∞',
        problems:[
          { q:`Evaluate: $\\displaystyle\\lim_{x\\to 0}\\frac{e^x-1}{x}$`,
            a:`$0/0$ form. Differentiate top and bottom: $e^x/1 \\to 1$. $\\boxed{1}$.` },
          { q:`Evaluate: $\\displaystyle\\lim_{x\\to\\infty}\\frac{\\ln x}{x}$`,
            a:`$\\infty/\\infty$ form. L'Hôpital: $(1/x)/1 \\to 0$. $\\boxed{0}$.` },
          { q:`Evaluate: $\\displaystyle\\lim_{x\\to 0^+} x\\ln x$`,

/* ============================================================
   RENDER BOARD
============================================================ */
function renderBoard() {
  const grid = document.getElementById('board-grid');
  grid.innerHTML = '';
  let total = 0;

  columns.forEach((col, ci) => {
    const colDiv = document.createElement('div');
    colDiv.className = 'col-group';

    const hdr = document.createElement('div');
    hdr.className = `col-header ${col.headerClass}`;
    hdr.innerHTML = `<div class="col-header-num">${col.label}</div><h2>${col.title}</h2>`;
    colDiv.appendChild(hdr);

    col.tiles.forEach((tile, ti) => {
      total += tile.problems.length;
      const el = document.createElement('div');
      el.className = `tile ${col.tileClass}`;
      el.setAttribute('role','button');
      el.setAttribute('tabindex','0');
      el.innerHTML = `
        <span class="tile-icon">${tile.icon}</span>
        <div class="tile-title">${tile.title}</div>
        <div class="tile-sub">${tile.sub}</div>
        <span class="tile-arrow">↗</span>`;
      el.addEventListener('click', () => openModal(ci, ti));
      el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') openModal(ci,ti); });
      colDiv.appendChild(el);
    });
    grid.appendChild(colDiv);
  });

  document.getElementById('problem-count-badge').textContent = `${total} problems`;
}

/* ============================================================
   MODAL HELPERS
============================================================ */
function buildHTML(problems) {
  return problems.map((p,i) => `
    <div class="problem-block">
      <div class="problem-num">Problem ${i+1} of ${problems.length}</div>
      <div class="problem-text">${p.q}</div>
      <button class="answer-toggle" id="tog-btn-${i}" onclick="toggleAns('ans-${i}','tog-btn-${i}')">
        <span class="toggle-icon">▼</span> Show Answer
      </button>
      <div class="answer-panel" id="ans-${i}">${p.a}</div>
    </div>`).join('');
}

function openModal(ci, ti) {
  const col  = columns[ci];
  const tile = col.tiles[ti];

  const accent = document.getElementById('modal-accent');
  accent.className = 'modal-header-accent';
  accent.style.background = col.accentVar;

  const lbl = document.getElementById('modal-col-label');
  lbl.style.color = col.accentVar;
  lbl.textContent = col.label + ' · ' + col.title;
  document.getElementById('modal-title').textContent = tile.title;

  const body = document.getElementById('modal-body');
  body.innerHTML = buildHTML(tile.problems);
  showModal(body);
}

function showModal(body) {
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (window.MathJax) {
    MathJax.startup.promise.then(() => MathJax.typesetPromise([body]));
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleAns(panelId, btnId) {
  const panel = document.getElementById(panelId);
  const btn   = document.getElementById(btnId);
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.innerHTML = `<span class="toggle-icon">▼</span> ${open ? 'Hide' : 'Show'} Answer`;
}

/* ============================================================
   RANDOM PRACTICE
============================================================ */
document.getElementById('random-btn').addEventListener('click', () => {
  const col   = columns[Math.floor(Math.random() * columns.length)];
  const tile  = col.tiles[Math.floor(Math.random() * col.tiles.length)];
  const prob  = tile.problems[Math.floor(Math.random() * tile.problems.length)];

  const accent = document.getElementById('modal-accent');
  accent.style.background = '';
  accent.className = 'modal-header-accent random-accent';

  const lbl = document.getElementById('modal-col-label');
  lbl.style.color = 'var(--text-muted)';
  lbl.textContent = 'BC Calculus · General Practice';
  document.getElementById('modal-title').textContent = 'Random Problem';

  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="problem-block" style="border-bottom:none;margin:0;padding:0">
      <div class="problem-num">🎲 Random Practice</div>
      <div class="problem-text">${prob.q}</div>
      <button class="answer-toggle" id="tog-btn-rand" onclick="toggleAns('ans-rand','tog-btn-rand')">
        <span class="toggle-icon">▼</span> Show Answer
      </button>
      <div class="answer-panel" id="ans-rand">${prob.a}</div>
    </div>`;
  showModal(body);
});

/* ============================================================
   EVENTS & INIT
============================================================ */
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

renderBoard();
</script>
